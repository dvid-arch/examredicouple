<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamRedi - Offline</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f1f5f9;
            color: #334155;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .logo {
            width: 80px;
            height: 80px;
            background: #3B82F6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        .logo svg {
            width: 40px;
            height: 40px;
            color: white;
        }
        h1 {
            color: #1E8449;
            margin-bottom: 10px;
        }
        p {
            max-width: 400px;
            line-height: 1.6;
        }
        .retry-btn {
            background: #1E8449;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        .retry-btn:hover {
            background: #166534;
        }
    </style>
</head>
<body>
    <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="4" width="12" height="3" rx="1.5" fill="currentColor"/>
            <rect x="4" y="9" width="18" height="3" rx="1.5" fill="currentColor"/>
            <rect x="4" y="14" width="10" height="3" rx="1.5" fill="currentColor"/>
            <rect x="4" y="19" width="15" height="3" rx="1.5" fill="currentColor"/>
        </svg>
    </div>
    <h1>You're Offline</h1>
    <p>It looks like you're not connected to the internet. Don't worry! You can still access some features when you're back online.</p>
    <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
</body>
</html>
